    <!-- Initialize Swiper -->
    <script>
      var swiper = new Swiper(".hero-slider", {
        slidesPerView: 1,
        centeredSlides: true,
        loop: true,
        autoplay: {
          delay: 5000,
          disableOnInteraction: false,
        },
        effect: "fade",
        spaceBetween: 10,
        navigation: {
          nextEl: ".swiper-button-next",

        },
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
      });
    </script>
    <!-- JavaScript -->
    <script>
      // Toast Notification
      var toast = document.getElementById("notification");
      if (toast) {
        window.onload = function () {
          const message = "{{ session('message') }}";
          const type = "{{ session('type') }}";
          switch (type) {
            case "success":
              showToast(message, "#4caf50", "bg-white text-dark");
              break;
            case "error":
              showToast(message, "#ff787a", "bg-white text-dark");
              break;
            default:
              showToast(message);
          }
        };
      } else {
        console.log("No Toast Available!");
      }
      function showToast(message, color = "#fff", bgColor = "#6c757d") {
        let toastBody = (document.querySelector(
          ".toast .toast-body"
        ).innerHTML = "");
        toastBody.classList.add(color);
        toastBody.style.backgroundColor = bgColor;
        toastBody.innerText = message;
        toast.show();
        setTimeout(() => {
          toast.hide();
        }, 12000);
      }

      // Sweet Alert

      Swal.fire({
        icon: "warning",
        title:
          '<strong><i class="fa fa-exclamation-circle"></i>&nbsp;&nbsp;Error!</strong>',
        html: `
                         @foreach($errors->all() as $error)
                           {{ $error }}<br/>
                           @endforeach`,
        confirmButtonClass: "btn btn-primary",
      });

      // Confirm Delete
      $(".delete").click(function () {
        Swal.fire({
          title: "Are you sure?",
          text: "You won't be able to revert this!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#3085d6",

          cancelButtonColor: "#d33",
          confirmButtonText: "Yes, delete it!",
        }).then((result) => {
          if (result.isConfirmed) {
            $(this).parent().submit();
          }
        });
      });
    </script>
    <!-- Vendor JS -->

    <!-- Theme JS -->
    <script src="assets/js/script.js"></script>
